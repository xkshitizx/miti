AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "lib/miti/data/date_data.rb"
    - "vendor/bundle/**/*"
    - "bin/**/*"
    - "node_modules/**/*"

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Max: 120
  Exclude: 
    - "miti.gemspec"
    - "spec/**/*"
    - "lib/miti/data/date_data.rb"

Metrics/MethodLength:
  Max: 15
  Exclude:
    - "lib/miti/data/date_data.rb"

Metrics/ClassLength:
  Max: 100
  Exclude:
    - "lib/miti/data/date_data.rb"
